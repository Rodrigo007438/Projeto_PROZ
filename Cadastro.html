<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" sizes="32x32" href="https://www.nicepng.com/png/full/204-2049937_logo-de-farmacia-png.png"/>
    <title> Controle de Estoque </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="conteudo">

        <div class="menu">
            <ul>
                <li><a href="Index.html">Pagina Inicial</a></li>
                <li><a href="Estoque.html">Estoque</a></li>
            </ul>
        </div>

        <div class="container">
            <h1> Controle de Estoque </h1>
            <p class="descricao">Cadastre produtos e acompanhe a quantidade disponível.</p>

            <form>
                <div class="grupo-form">
                    <label for="nome">Nome do produto</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite o nome do produto">
                </div>

                <div class="linha">
                    <div class="grupo-form">
                        <label for="codigo">Código do produto</label>
                        <input type="text" id="codigo" name="codigo" placeholder="Digite o código">
                    </div>

                    <div class="grupo-form">
                        <label for="quantidade">Quantidade</label>
                        <input type="number" id="quantidade" name="quantidade" min="0" placeholder="Digite a quantidade">
                    </div>
                </div>

                <div class="grupo-form">
                    <label for="preco">Preço</label>
                    <input type="number" id="preco" name="preco" step="0.01" min="0" placeholder="Digite o preço">
                </div>

                <div class="botoes">
                    <button type="submit" class="btn-cadastrar">Cadastrar Produto</button>
                    <button type="button" class="btn-listar">Listar Produtos</button>
                </div>
            </form>

            
        </div>
    </div>    
</body>
</html>
