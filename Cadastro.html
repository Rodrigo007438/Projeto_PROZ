<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" sizes="32x32"
        href="https://www.nicepng.com/png/full/204-2049937_logo-de-farmacia-png.png" />
    <title> Controle de Estoque </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}" <body>

    <div class=" conteudo">

        <header class="navbar">

            <div class="logo">
                <a href="{{url_for('main.index') }}"><img
                        src="https://www.nicepng.com/png/full/204-2049937_logo-de-farmacia-png.png" alt="logo" /></a>
            </div>

            <ul class="menu">

                <li><a href="{{url_for('main.index') }}">Pagina Inicial</a></li>
                <li><a href="{{url_for('main.estoque') }}">Estoque</a></li>

            </ul>
        </header>

        <div class="container">
            <h1> Controle de Estoque </h1>
            <p class="descricao">Cadastre produtos e acompanhe a quantidade disponível.</p>

            <form action="{{url_for('main.salvar_produto')}}" method="post">
                <div class="grupo-form">
                    <label for="nome">Nome do produto</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite o nome do produto">
                </div>

                <div class="linha">
                    <div class="grupo-form">
                        <label for="codigo">Código do produto</label>
                        <input type="text" id="codigo" name="codigo" placeholder="Digite o código">
                    </div>

                    <div class="grupo-form">
                        <label for="quantidade">Quantidade</label>
                        <input type="number" id="quantidade" name="quantidade" min="0"
                            placeholder="Digite a quantidade">
                    </div>
                </div>

                <div class="grupo-form">
                    <label for="preco">Preço</label>
                    <input type="number" id="preco" name="preco" step="0.01" min="0" placeholder="Digite o preço">
                </div>

                <div class="botoes">
                    <button type="submit" class="btn-cadastrar">Cadastrar Produto</button>
                    <button type="button" class="btn-listar">Listar Produtos</button>
                </div>
            </form>


        </div>
    </div>
    </body>

</html>
